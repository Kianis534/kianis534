name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Generate Rainbow Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: Kianis534
          outputs: |
            output/github-contribution-grid-snake-rainbow.svg?palette=rainbow&square_size=20&trail_length=4

      - name: Commit & Push Snake
        uses: stefanzweifel/git-auto-commit-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          commit_message: "Update rainbow snake animation"
          branch: main
          file_pattern: "output/github-contribution-grid-snake-rainbow.svg"
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"
          create_branch: false
