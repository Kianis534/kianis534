name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ensure Node 24

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Step 2: Ensure output folder exists
      - name: Create Output Folder
        run: mkdir -p output

      # Step 3: Generate Rainbow Snake SVG
      - name: Generate Rainbow Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: Kianis534
          outputs: |
            output/github-contribution-grid-snake-rainbow.svg?palette=rainbow&square_size=20&trail_length=6

      # Step 4: Commit & Push the updated SVG
      - name: Commit & Push Snake
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update rainbow snake animation"
          branch: main
          file_pattern: "output/github-contribution-grid-snake-rainbow.svg"
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"
          create_branch: false  # important if you want to commit directly to main
